base:
  李氏三拼:
    __append:
     # 萬象詞庫處理
      - xform/^([a-zāōēīūǖáóéíúǘǎǒěǐǔǚàòèìùǜńňǹḿm̀ü]+);[;,a-z]*$/$1/        # 刪除輔助碼
      - xform/^(.*)ü(.*)$/$1v$2/
      - xform/ā(\w*)/a$1\x31/
      - xform/ō(\w*)/o$1\x31/
      - xform/ē(\w*)/e$1\x31/
      - xform/ī(\w*)/i$1\x31/
      - xform/ū(\w*)/u$1\x31/
      - xform/ǖ(\w*)/v$1\x31/
      - xform/á(\w*)/a$1\x32/
      - xform/ó(\w*)/o$1\x32/
      - xform/é(\w*)/e$1\x32/
      - xform/í(\w*)/i$1\x32/
      - xform/ú(\w*)/u$1\x32/
      - xform/ǘ(\w*)/v$1\x32/
      - xform/ǎ(\w*)/a$1\x33/
      - xform/ǒ(\w*)/o$1\x33/
      - xform/ě(\w*)/e$1\x33/
      - xform/ǐ(\w*)/i$1\x33/
      - xform/ǔ(\w*)/u$1\x33/
      - xform/ǚ(\w*)/v$1\x33/
      - xform/à(\w*)/a$1\x34/
      - xform/ò(\w*)/o$1\x34/
      - xform/è(\w*)/e$1\x34/
      - xform/ì(\w*)/i$1\x34/
      - xform/ù(\w*)/u$1\x34/
      - xform/ǜ(\w*)/v$1\x34/
      - xform/ń(\w*)/n$1\x32/
      - xform/ň(\w*)/n$1\x33/
      - xform/ǹ(\w*)/n$1\x34/
      - xform/ḿ(\w*)/m$1\x32/
      - xform/m̀(\w*)/m$1\x34/
      - xform/^([a-z]+)$/$1\x35/      # 未標調音節統一轉換為輕聲
     # 1  音節修正合併
      - erase/^xx$/
      - xform/^m([1-5])$/mu$1/        # 鼻音m（呣）轉化爲mu
      - xform/^n([1-5])$/en$1/        # 鼻音n（嗯）转化为en
      - xform/^hm([1-5])$/hen$1/      # 鼻音hm（噷）转化为hen
      - xform/^r5$/er5/               # r5（兒）轉化爲er5
      - xform/^eh([1-5])$/e$1/        # 模糊音：eh（誒欸）、e合併
     # 2  拼音完整形式
      - xform/^([jqx])u/$1v/
      - xform/iu/iou/
      - xform/([uv])i/$1ei/
      - xform/(?<![uwv])ong/ung/
     # - xform/([uwv])ong/$1ng/
      - xform/^yi?/i/
      - xform/^wu?/u/
      - xform/iu/v/
      - xform/([iuv])n/$1en/
     # 3  異拼
      - xform/([bpm])ueng/$1ong/
      - xform/([bpm])veng/$1iong/
      - derive/ueng/ong/
      - derive/(?<![zcs])veng/iong/
     # - xform/(\w+)ueng/$1ong/
     # - xform/veng/iong/
      - erase/([bpm])([uv][a-z]+|v)([1-5])$/
      - erase/fao([1-5])$/
      - erase/(\w*)(iei|uong|vong)([1-5])$/
      - erase/(\w*)v(ai|ou|ao)([1-5])$/
     # 4  尖音處理
      - xform/^zii([1-5])$/buei$1/
      - xform/^zi(\w+[1-5])$/bu$1/
      - xform/^z(v\w*[1-5])$/b$1/
      - xform/^cii([1-5])$/puei$1/
      - xform/^ci(\w+[1-5])$/pu$1/
      - xform/^c(v\w*[1-5])$/p$1/
      - xform/^sii([1-5])$/muei$1/
      - xform/^si(\w+[1-5])$/mu$1/
      - xform/^s(v\w*[1-5])$/m$1/
     # 5  音節合併
      - xform/^([zcs]h?|r)i([1-5])/$1o$2/
      - xform/^([zcs])([aoe]\w*)([1-5])$/$1hi$2$3/
      - xform/^([zcs])u([aoe]\w*)?([1-5])$/$1hv$2$3/
      - xform/^f([aoe]\w*)([1-5])$/ri$1$2/
      - xform/^fiao([1-5])$/riao$1/
      - xform/^fu([aoe]\w*)?([1-5])$/rv$1$2/
     # 6  第1碼聲母
      - xform/^b/Q/
      - xform/^p/W/
      - xform/^m/E/
      - xform/^[fr]/R/
      - xform/^d/A/
      - xform/^t/S/
      - xform/^n/D/
      - xform/^l/F/
      - xform/^[gj]/Z/
      - xform/^[kq]/X/
      - xform/^[hx]/C/
      - xform/^([aoeiuv])/V$1/
      - xform/^zh?/T/
      - xform/^ch?/G/
      - xform/^sh?/B/
     # 7  第2碼韻母
      - xform/^([QWERTASDFGZXCVB])(a|an|ang)([1-5])$/$1Q$2$3/
      - xform/^([QWERTASDFGZXCVB])(ai|ei|ao)([1-5])$/$1W$2$3/
      - xform/^([QWERTASDFGZXCVB])(o|ou|ong)([1-5])$/$1E$2$3/
      - xform/^([QWERTASDFGZXCVB])(e|en|eng)([1-5])$/$1R$2$3/
    
      - xform/^([QWERTASDFGZXCVB])(ia|ian|iang)([1-5])$/$1A$2$3/
      - xform/^([QWERTASDFGZXCVB])(iai|iei|iao|i)([1-5])$/$1S$2$3/
      - xform/^([QWERTASDFGZXCVB])(io|iou|iong)([1-5])$/$1D$2$3/
      - xform/^([QWERTASDFGZXCVB])(ie|ien|ieng)([1-5])$/$1F$2$3/
    
      - xform/^([QWERTASDFGZXCVB])(ua|uan|uang)([1-5])$/$1Z$2$3/
      - xform/^([QWERTASDFGZXCVB])(uai|uei|uao)([1-5])$/$1X$2$3/
      - xform/^([QWERTASDFGZXCVB])(uo|uou|uong|u)([1-5])$/$1C$2$3/
      - xform/^([QWERTASDFGZXCVB])(ue|uen|ueng)([1-5])$/$1V$2$3/
    
      - xform/^([QWERTASDFGZXCVB])(va|van|vang|er)([1-5])$/$1T$2$3/
      - xform/^([QWERTASDFGZXCVB])(vo|vei|vong|v)([1-5])$/$1G$2$3/
      - xform/^([QWERTASDFGZXCVB])(ve|ven|veng)([1-5])$/$1B$2$3/
     # 8  第3碼去重碼&聲調
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)1$/$1Q/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)2$/$1W/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)3$/$1E/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)4$/$1R/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)5$/$1T/
    
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)1$/$1A/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)2$/$1S/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)3$/$1D/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)4$/$1F/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)5$/$1G/
    
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])1$/$1Z/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])2$/$1X/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])3$/$1C/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])4$/$1V/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])5$/$1B/
    
      - erase/^[QWERTASDFGZXCVB][a-z0-9]+/
      - xlit/QWERTYUIOPASDFGHJKLZXCVBNM/qwertyuiopasdfghjklzxcvbnm/
      - erase/^[yuiophjklnm]\w*/
    
     # 9  簡拼
      - derive/^t([qwertasdfgzxcvb]{2})$/y$1/
      - derive/^g([qwertasdfgzxcvb]{2})$/h$1/
      - derive/^b([qwertasdfgzxcvb]{2})$/n$1/
     # - abbrev/^([qwertasdfgzxcvbyhn])[qwertasdfgzxcvb]{2}$/$1/     # 首碼簡拼
      - derive/^([qwertasdfgzxcvbyhn])t([qwertasdfgzxcvb])$/$1y$2/
      - derive/^([qwertasdfgzxcvbyhn])g([qwertasdfgzxcvb])$/$1h$2/
      - derive/^([qwertasdfgzxcvbyhn])b([qwertasdfgzxcvb])$/$1n$2/
     # - derive/^([qwertasdfgzxcvbyhn]{2})[qwertasdfgzxcvb]$/$1/     # 前兩碼簡拼
      - derive/^([qwertasdfgzxcvbyhn]{2})[qwert]$/$1y/
      - derive/^([qwertasdfgzxcvbyhn]{2})[asdfg]$/$1h/
      - derive/^([qwertasdfgzxcvbyhn]{2})[zxcvb]$/$1n/

pro:
  李氏三拼:
    __append:
     # 0  万象词库转地球拼音词库
      - xform/^([a-z]+)(;.*)$/$1⑤$2/
      - xform/^(.*)ā(.*)(;.*)$/$1a$2①$3/
      - xform/^(.*)á(.*)(;.*)$/$1a$2②$3/
      - xform/^(.*)ǎ(.*)(;.*)$/$1a$2③$3/
      - xform/^(.*)à(.*)(;.*)$/$1a$2④$3/            # 剑jiàn;qd,rd → jian④;qd,rd
      - xform/^(.*)ȧ(.*)(;.*)$/$1a$2⑤$3/
      - xform/^(.*)ō(.*)(;.*)$/$1o$2①$3/
      - xform/^(.*)ó(.*)(;.*)$/$1o$2②$3/
      - xform/^(.*)ǒ(.*)(;.*)$/$1o$2③$3/
      - xform/^(.*)ò(.*)(;.*)$/$1o$2④$3/
      - xform/^(.*)ȯ(.*)(;.*)$/$1o$2⑤$3/
      - xform/^(.*)ē(.*)(;.*)$/$1e$2①$3/
      - xform/^(.*)é(.*)(;.*)$/$1e$2②$3/
      - xform/^(.*)ě(.*)(;.*)$/$1e$2③$3/
      - xform/^(.*)è(.*)(;.*)$/$1e$2④$3/
      - xform/^(.*)ė(.*)(;.*)$/$1e$2⑤$3/
      - xform/^(.*)ī(.*)(;.*)$/$1i$2①$3/
      - xform/^(.*)í(.*)(;.*)$/$1i$2②$3/
      - xform/^(.*)ǐ(.*)(;.*)$/$1i$2③$3/
      - xform/^(.*)ì(.*)(;.*)$/$1i$2④$3/
      - xform/^(.*)i̇(.*)(;.*)$/$1i$2⑤$3/
      - xform/^(.*)ū(.*)(;.*)$/$1u$2①$3/
      - xform/^(.*)ú(.*)(;.*)$/$1u$2②$3/
      - xform/^(.*)ǔ(.*)(;.*)$/$1u$2③$3/
      - xform/^(.*)ù(.*)(;.*)$/$1u$2④$3/
      - xform/^(.*)u̇(.*)(;.*)$/$1u$2⑤$3/
      - xform/^(.*)ǖ(.*)(;.*)$/$1v$2①$3/
      - xform/^(.*)ǘ(.*)(;.*)$/$1v$2②$3/
      - xform/^(.*)ǚ(.*)(;.*)$/$1v$2③$3/
      - xform/^(.*)ǜ(.*)(;.*)$/$1v$2④$3/
      - xform/^(.*)ü̇(.*)(;.*)$/$1ü$2⑤$3/
      - xform/^(.*)ü(.*)$/$1v$2/
      - xform/^(.*)ń(.*)(;.*)$/$1n$2②$3/
      - xform/^(.*)ň(.*)(;.*)$/$1n$2③$3/
      - xform/^(.*)ǹ(.*)(;.*)$/$1n$2④$3/
      - xform/^(.*)ḿ(.*)(;.*)$/$1m$2②$3/
      - xform/^(.*)m̀(.*)(;.*)$/$1m$2④$3/
      - xlit/①②③④⑤/12345                  # 剑jian④;qd,rd → jian4;qd,rd
     # 1  音节修正合并
      - derive/^shui2/shei2/
      - xform/^ng(\d)$/eng$1/
      - xform/^n(\d)/en$1/                   # 嗯    n4;kx → en4;kx
      - xform/^m(\d)(;.*)/me$1$2/
     # - erase/^xx$/

     # 2  拼音完整形式
      - xform/^([jqx])u/$1v/                 # 去    qu4;ts → qv4;ts
      - xform/iu/iou/                        # 球    qiu2;wq → qiou2;wq
      - xform/([uv])i/$1ei/                  # 规    gui1;fj → guei1;fj
      - xform/(?<![uwv])ong/ung/             # hong → hung    当ong前面不是uwv时，才会变成ung
     # - xform/([uwv])ong/$1ng/
      - xform/^yi?/i/                        # yi → i    yan → ian    yuan → iuan
      - xform/^wu?/u/                        # wu → u    wan → uan
      - xform/iu/v/                          # 淤iu → v    渊iuan → van
      - xform/([iuv])n/$1en/                 # 因in → ien    温un → uen    晕vn →ven
     # 3  異拼
      - xform/([bpm])ueng/$1ong/
      - xform/([bpm])veng/$1iong/
      - derive/ueng/ong/
      - derive/(?<![zcs])veng/iong/
     # - xform/(\w+)ueng/$1ong/
     # - xform/veng/iong/
      - erase/([bpm])([uv][a-z]+|v)(\d)$/
      - erase/fao(\d)$/
      - erase/(\w*)(iei|uong|vong)(\d)$/
      - erase/(\w*)v(ai|ou|ao)(\d)$/
     # 4  尖音處理

     # 5  音節合併
      - xform/^([zcs]h?|r)i(\d)(;.*)$/$1o$2$3/                # 日ri4;ka → ro4;ka    之zhi1;dn → zho1;dn    自zi4;po → zo4;po
      - xform/^([zcs])([aoe]\w*)(\d)(;.*)$/$1hi$2$3$4/        # 砸za2;uj → zhia2;uj    层ceng2;uy → chieng2;uy    自zo4;po → zhio4;po
      - xform/^([zcs])u([aoe]\w*)?(\d)(;.*)$/$1hv$2$3$4/      # 做zuo4;rw → zhvo4;rw
      - xform/^f([aoe]\w*)(\d)(;.*)$/ri$1$2$3/                # 发fa1;fy → ria1;fy
      - xform/^fiao(\d)$/riao$1/                              # 覅fiao4; → riao4;
      - xform/^fu([aoe]\w*)?(\d)(;.*)$/$1rv$2$3/              # 扶fu2;ff → rv2;ff    佛fuo2;rf → rvo2;rf
    
     # 6  第1碼聲母
      - xform/^b/Q/
      - xform/^p/W/
      - xform/^m/E/
      - xform/^[fr]/R/
      - xform/^d/A/
      - xform/^t/S/
      - xform/^n/D/
      - xform/^l/F/
      - xform/^[gj]/Z/                                 # 剑jian4;qd,rd → Zian4;qd,rd
      - xform/^[kq]/X/
      - xform/^[hx]/C/
      - xform/^([aoeiuv])/V$1/
      - xform/^zh?/T/
      - xform/^ch?/G/
      - xform/^sh?/B/
     # 7  第2碼韻母
      - xform/^([QWERTASDFGZXCVB])(a|an|ang)([1-5])(;.*)$/$1Q$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(ai|ei|ao)([1-5])(;.*)$/$1W$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(o|ou|ong)([1-5])(;.*)$/$1E$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(e|en|eng)([1-5])(;.*)$/$1R$2$3$4/
  
      - xform/^([QWERTASDFGZXCVB])(ia|ian|iang)([1-5])(;.*)$/$1A$2$3$4/    # 剑Zian4;qd,rd → ZAian4;qd,rd
      - xform/^([QWERTASDFGZXCVB])(iai|iei|iao|i)([1-5])(;.*)$/$1S$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(io|iou|iong)([1-5])(;.*)$/$1D$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(ie|ien|ieng)([1-5])(;.*)$/$1F$2$3$4/

      - xform/^([QWERTASDFGZXCVB])(ua|uan|uang)([1-5])(;.*)$/$1Z$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(uai|uei|uao)([1-5])(;.*)$/$1X$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(uo|uou|uong|u)([1-5])(;.*)$/$1C$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(ue|uen|ueng)([1-5])(;.*)$/$1V$2$3$4/
    
      - xform/^([QWERTASDFGZXCVB])(va|van|vang|er)([1-5])(;.*)$/$1T$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(vo|vei|vong|v)([1-5])(;.*)$/$1G$2$3$4/
      - xform/^([QWERTASDFGZXCVB])(ve|ven|veng)([1-5])(;.*)$/$1B$2$3$4/
     # 8  第3碼去重碼&聲調
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)1(;.*)$/$1Q$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)2(;.*)$/$1W$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)3(;.*)$/$1E$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)4(;.*)$/$1R$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]|[iuv]?ai|er)5(;.*)$/$1T$3/

      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)1(;.*)$/$1A$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)2(;.*)$/$1S$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)3(;.*)$/$1D$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)4(;.*)$/$1F$3/      # 剑ZAian4;qd,rd → ZAF;qd,rd
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[ae]n|[iuv]?ou|[iuv]?ei|i)5(;.*)$/$1G$3/

      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])1(;.*)$/$1Z$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])2(;.*)$/$1X$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])3(;.*)$/$1C$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])4(;.*)$/$1V$3/
      - xform/^([QWERTASDFGZXCVB]{2})([iuv]?[aeo]ng|[iuv]?ao|[uv])5(;.*)$/$1B$3/
     # 9  简拼处理
      - xlit/QWERTASDFGZXCVB/qwertasdfgzxcvb/      # 剑ZAF;qd,rd → zaf;qd,rd
      - erase/^[yuiophjklnm]\w*/                # 清除掉非15键开头的音节

      - derive/^t([qwertasdfgzxcvb]{2})/y$1/                                  # 自tdr;po → ydr;po
      - derive/^g([qwertasdfgzxcvb]{2})/h$1/
      - derive/^b([qwertasdfgzxcvb]{2})/n$1/
     # - abbrev/^([qwertasdfgzxcvbyhn])[qwertasdfgzxcvb]{2}$/$1/     # 首碼簡拼
      - derive/^([qwertasdfgzxcvbyhn])t([qwertasdfgzxcvb])/$1y$2/            # 渊vta;dl → vya;dl
      - derive/^([qwertasdfgzxcvbyhn])g([qwertasdfgzxcvb])/$1h$2/
      - derive/^([qwertasdfgzxcvbyhn])b([qwertasdfgzxcvb])/$1n$2/
     # - derive/^([qwertasdfgzxcvbyhn]{2})[qwertasdfgzxcvb]$/$1/     # 前兩碼簡拼
      - derive/^([qwertasdfgzxcvbyhn]{2})[qwert]/$1y/
      - derive/^([qwertasdfgzxcvbyhn]{2})[asdfg]/$1h/                          # 剑zaf;qd,rd → zah;qd,rd
      - derive/^([qwertasdfgzxcvbyhn]{2})[zxcvb]/$1n/
     # 10  辅助码处理
