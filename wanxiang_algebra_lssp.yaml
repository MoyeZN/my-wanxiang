      - derive|^(..)([a-z])([a-z])(\d?)$|$1\u$2$3$4|
     # 变体2：转第4位大写 (abcD1)
      - derive|^(..)([a-z])([a-z])(\d?)$|$1$2\u$3$4|
     # 变体3：两字母都转大写 (abCD1)
      - derive|^(..)([a-z])([a-z])(\d?)$|$1\u$2\u$3$4|

